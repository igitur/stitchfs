name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'
    - run: go test ./...
    - name: Build
      run: |
        GOOS=linux GOARCH=amd64 go build -o stitchfs-linux-amd64 .
        GOOS=linux GOARCH=arm64 go build -o stitchfs-linux-arm64 .
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: stitchfs-linux-*
